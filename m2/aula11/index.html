<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Landing Page</title>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <header>
    <nav class="barra-navegacao">
      <div class="logo">Logo</div>
      <ul class="lista-links">
        <li><a href="#inicio">Início</a></li>
        <li><a href="#projetos">Trabalhos</a></li>
        <li><a href="#contato">Contato</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section id="destaque">
      <h1>Apresentação</h1>
      <div>
        <p>Meu nome é Vinicius Rizzato!</p>
      </div>

      <div style="margin-top: 4rem;">
        <h2>O melhor animal do mundo!</h2>
        <div class="destaque-galeria">
          <a href="https://pt.wikipedia.org/wiki/Marmota" target="_blank">
            <img src="img/marmota-1.jpg" alt="Marmota">
          </a>
          <a href="https://pt.wikipedia.org/wiki/Marmota" target="_blank">
            <img src="img/marmota-2.jpg" alt="Marmota">
          </a>
          <a href="https://pt.wikipedia.org/wiki/Marmota" target="_blank">
            <img src="img/marmota-3.jpg" alt="Marmota">
          </a>

        </div>
      </div>
    </section>

    <section id="projetos">
      <h2>Sobre mim</h2>

      <div class="grade-projetos">
        <article class="item-projeto">Projeto 1</article>
        <article class="item-projeto">Projeto 2</article>
        <article class="item-projeto">Projeto 3</article>
      </div>

      <div class="lista-habilidades">
        <span class="etiqueta-skill">HTML</span>
        <span class="etiqueta-skill">CSS</span>
        <span class="etiqueta-skill">JS</span>
        <span class="etiqueta-skill">Mestre Pokemon</span>
        <span class="etiqueta-skill">Destruidor de Alakazans</span>
      </div>

      <form class="formulario-contato" id="contato">
        <input type="text" placeholder="Nome">
        <textarea placeholder="Mensagem"></textarea>
      </form>
    </section>
  </main>

  <footer>
    <p>Creditos a mim!</p>
  </footer>
</body>

</html>
